<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inner Mind Animation</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
        #controls {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            padding: 10px;
            border-radius: 5px;
            font-family: sans-serif;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="controls">
        <label>Focus Drift: <input type="range" id="ballSpeed" min="100" max="2000" value="500"></label><br>
        <label>Rotation: <input type="range" id="rotSpeed" min="0" max="50" value="10"></label><br>
        <label>Intensities: <input type="range" id="numBalls" min="1" max="5" value="1"></label><br>
        <button id="pauseBtn">Pause</button>
    </div>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let isPaused = false;

        document.getElementById('pauseBtn').addEventListener('click', (e) => {
            isPaused = !isPaused;
            e.target.innerText = isPaused ? 'Resume' : 'Pause';
        });

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const numZones = 7;
        const radius = 200;
        const zoneRadius = 40;
        const awarenessRadius = 15;

        const zones = [];
        for (let i = 0; i < numZones; i++) {
            const angle = (i / numZones) * 2 * Math.PI;
            zones.push({
                initialAngle: angle,
                basePulse: 0
            });
        }

        let awarenessNodes = [];

        function createNode() {
            const current = Math.floor(Math.random() * numZones);
            return {
                currentZoneIndex: current,
                targetZoneIndex: getWeightedNextZone(current),
                progress: 0,
                isMoving: false,
                lastTime: performance.now(),
                pauseStartTime: performance.now()
            };
        }

        // Focus Gravity: Weighted Markov Chain
        function getWeightedNextZone(current) {
            const r = Math.random();
            // High probability to move to adjacent zones (drift), low to jump
            if (r < 0.7) return (current + 1) % numZones;
            if (r < 0.9) return (current - 1 + numZones) % numZones;
            return Math.floor(Math.random() * numZones);
        }

        function getZonePosition(zone, rotation) {
            const angle = zone.initialAngle + rotation;
            return {
                x: width / 2 + radius * Math.cos(angle),
                y: height / 2 + radius * Math.sin(angle)
            };
        }

        function draw(rotation, time) {
            ctx.clearRect(0, 0, width, height);

            const ballsOnZone = {};
            awarenessNodes.forEach(node => {
                if (!node.isMoving) {
                    if (!ballsOnZone[node.currentZoneIndex]) ballsOnZone[node.currentZoneIndex] = 0;
                    ballsOnZone[node.currentZoneIndex]++;
                }
            });

            const currentPositions = zones.map(z => getZonePosition(z, rotation));

            // Active Awareness: Rhythmic Pulse
            const heartRate = 0.005;
            const pulse = Math.sin(time * heartRate) * 0.2 + 0.8;

            currentPositions.forEach((pos, i) => {
                const count = ballsOnZone[i] || 0;
                const pulseIntensity = 1 + count * 0.5; // More balls = higher pulse
                const finalScale = pulse * pulseIntensity;

                ctx.beginPath();
                ctx.arc(pos.x, pos.y, zoneRadius * finalScale, 0, 2 * Math.PI);
                ctx.strokeStyle = count > 0 ? `hsl(${count * 60}, 100%, 50%)` : '#fff';
                ctx.lineWidth = 2 * finalScale;
                ctx.stroke();
            });

            // Draw Awareness Nodes
            awarenessNodes.forEach(node => {
                let x, y;
                if (node.isMoving) {
                    const start = currentPositions[node.currentZoneIndex];
                    const end = currentPositions[node.targetZoneIndex];
                    x = start.x + (end.x - start.x) * node.progress;
                    y = start.y + (end.y - start.y) * node.progress;
                } else {
                    const pos = currentPositions[node.currentZoneIndex];
                    x = pos.x; y = pos.y;
                }
                ctx.beginPath();
                ctx.arc(x, y, awarenessRadius, 0, 2 * Math.PI);
                ctx.fillStyle = '#0f0';
                ctx.fill();
            });
        }

        let totalRotation = 0;
        let lastTimestamp = performance.now();
        function animate(currentTime) {
            if (!isPaused) {
                const numNodes = parseInt(document.getElementById('numBalls').value);
                while (awarenessNodes.length < numNodes) awarenessNodes.push(createNode());
                while (awarenessNodes.length > numNodes) awarenessNodes.pop();

                const speed = parseInt(document.getElementById('ballSpeed').value);
                const rotSpeed = parseInt(document.getElementById('rotSpeed').value) / 2000;
                totalRotation += rotSpeed;

                awarenessNodes.forEach(node => {
                    const dt = currentTime - lastTimestamp;
                    if (node.isMoving) {
                        node.progress += dt / speed;
                        if (node.progress >= 1) {
                            node.progress = 0;
                            node.currentZoneIndex = node.targetZoneIndex;
                            node.targetZoneIndex = getWeightedNextZone(node.currentZoneIndex);
                            node.isMoving = false;
                            node.pauseStartTime = currentTime;
                        }
                    } else if (currentTime - node.pauseStartTime > 1000) {
                        node.isMoving = true;
                    }
                });
                lastTimestamp = currentTime;
            }
            draw(totalRotation, currentTime);
            requestAnimationFrame(animate);
        }

        awarenessNodes.push(createNode());
        requestAnimationFrame(animate);
    </script>
</body>
</html>

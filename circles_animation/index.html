<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inner Mind Animation</title>
    <style>
        body { margin: 0; overflow: hidden; background: #2c3e50; }
        canvas { display: block; }
        #controls {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            padding: 10px;
            border-radius: 5px;
            font-family: sans-serif;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="controls">
        <label>Focus Drift: <input type="range" id="ballSpeed" min="100" max="2000" value="500"></label><br>
        <label>Rotation: <input type="range" id="rotSpeed" min="0" max="50" value="10"></label><br>
        <label>Intensities: <input type="range" id="numBalls" min="1" max="5" value="1"></label><br>
        <label>Pulse Speed: <input type="range" id="pulseSpeed" min="1" max="20" value="5"></label><br>
        <button id="pauseBtn">Pause</button>
    </div>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let isPaused = false;
        let lastTime = performance.now();

        document.getElementById('pauseBtn').addEventListener('click', (e) => {
            isPaused = !isPaused;
            e.target.innerText = isPaused ? 'Resume' : 'Pause';
        });

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const numZones = 7;
        const radius = 200;
        const zoneRadius = 40;
        const awarenessRadius = 15;

        const zones = [];
        for (let i = 0; i < numZones; i++) {
            const angle = (i / numZones) * 2 * Math.PI;
            zones.push({ initialAngle: angle, ripples: [] });
        }

        let awarenessNodes = [];

        function createNode() {
            const current = Math.floor(Math.random() * numZones);
            return {
                currentZoneIndex: current,
                targetZoneIndex: getWeightedNextZone(current),
                progress: 0,
                isMoving: false,
                lastTime: performance.now(),
                pauseStartTime: performance.now(),
                pauseDuration: Math.random() * 3500 + 500
            };
        }

        function getWeightedNextZone(current) {
            const r = Math.random();
            if (r < 0.7) return (current + 1) % numZones;
            if (r < 0.9) return (current - 1 + numZones) % numZones;
            return Math.floor(Math.random() * numZones);
        }

        function getZonePosition(zone, rotation) {
            const angle = zone.initialAngle + rotation;
            return {
                x: width / 2 + radius * Math.cos(angle),
                y: height / 2 + radius * Math.sin(angle)
            };
        }

        // Draw Membrane Effect (Multiple ripples)
        function drawMembraneCircle(ctx, x, y, radius, ripples) {
            ctx.beginPath();
            const segments = 64;
            for (let i = 0; i <= segments; i++) {
                const angle = (i / segments) * 2 * Math.PI;
                let totalDeformation = 0;
                // Sum all active ripples
                ripples.forEach(r => {
                    // Ripple dissipates and moves outwards
                    const wave = Math.sin(angle * 4 + r.age * 0.2) * r.amplitude;
                    totalDeformation += wave;
                });
                
                const r = radius + totalDeformation;
                const px = x + r * Math.cos(angle);
                const py = y + r * Math.sin(angle);
                if (i === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.closePath();
        }

        function draw(rotation, time) {
            ctx.clearRect(0, 0, width, height);

            const nodeGroups = {};
            awarenessNodes.forEach(node => {
                const zoneIdx = node.isMoving ? -1 : node.currentZoneIndex;
                if (zoneIdx !== -1) {
                    if (!nodeGroups[zoneIdx]) nodeGroups[zoneIdx] = [];
                    nodeGroups[zoneIdx].push(node);
                }
            });

            const currentPositions = zones.map(z => getZonePosition(z, rotation));

            const pulseSpeed = parseInt(document.getElementById('pulseSpeed').value) / 1000;
            const pulse = Math.sin(time * pulseSpeed) * 0.2 + 0.8;

            currentPositions.forEach((pos, i) => {
                const nodes = nodeGroups[i] || [];
                const count = nodes.length;
                const zone = zones[i];
                
                // Update ripples (decay)
                if (!isPaused) {
                    zone.ripples = zone.ripples.filter(r => {
                        r.age += 0.5;
                        r.amplitude *= 0.92;
                        return r.amplitude > 0.1;
                    });
                }

                // Vibration (agitation) - Only when not paused
                const vibration = (!isPaused && count > 1) ? (Math.random() - 0.5) * count * 4 : 0;

                const pulseIntensity = 1 + count * 0.3;
                const finalScale = pulse * pulseIntensity;

                drawMembraneCircle(ctx, pos.x + vibration, pos.y + vibration, zoneRadius * finalScale, zone.ripples);
                
                ctx.strokeStyle = count >= 3 ? '#ff6b6b' : count === 2 ? '#f1c40f' : count === 1 ? '#2ecc71' : '#ecf0f1';
                ctx.lineWidth = 3 * finalScale;
                ctx.stroke();
            });

            awarenessNodes.forEach((node) => {
                let x, y, isStretched = false, angleToTarget = 0;

                if (node.isMoving) {
                    const start = currentPositions[node.currentZoneIndex];
                    const end = currentPositions[node.targetZoneIndex];
                    x = start.x + (end.x - start.x) * node.progress;
                    y = start.y + (end.y - start.y) * node.progress;
                    isStretched = true;
                    angleToTarget = Math.atan2(end.y - start.y, end.x - start.x);
                } else {
                    const pos = currentPositions[node.currentZoneIndex];
                    const group = nodeGroups[node.currentZoneIndex];
                    const nodeIdx = group.indexOf(node);
                    const count = group.length;

                    if (count > 1) {
                        const angle = (nodeIdx / count) * 2 * Math.PI;
                        x = pos.x + (zoneRadius * 0.4) * Math.cos(angle);
                        y = pos.y + (zoneRadius * 0.4) * Math.sin(angle);
                    } else {
                        x = pos.x; y = pos.y;
                    }
                }

                ctx.beginPath();
                if (isStretched) {
                    ctx.ellipse(x, y, awarenessRadius * 1.5, awarenessRadius, angleToTarget, 0, 2 * Math.PI);
                    ctx.fillStyle = '#f1c40f'; 
                    ctx.strokeStyle = '#a1880a';
                } else {
                    ctx.arc(x, y, awarenessRadius, 0, 2 * Math.PI);
                    ctx.fillStyle = '#2ecc71'; 
                    ctx.strokeStyle = '#1e8449';
                }
                ctx.lineWidth = 4;
                ctx.stroke();
                ctx.fill();
            });
        }

        let totalRotation = 0;
        let runningTime = 0;

        function animate(currentTime) {
            const dt = currentTime - lastTime;
            lastTime = currentTime;

            if (!isPaused) {
                runningTime += dt;
                
                const numNodes = parseInt(document.getElementById('numBalls').value);
                while (awarenessNodes.length < numNodes) awarenessNodes.push(createNode());
                while (awarenessNodes.length > numNodes) awarenessNodes.pop();

                const speed = parseInt(document.getElementById('ballSpeed').value);
                const rotSpeed = parseInt(document.getElementById('rotSpeed').value) / 2000;
                totalRotation += rotSpeed;

                awarenessNodes.forEach(node => {
                    if (node.isMoving) {
                        node.progress += dt / speed;
                        if (node.progress >= 1) {
                            node.progress = 0;
                            // Add ripple upon arrival
                            zones[node.targetZoneIndex].ripples.push({ amplitude: 10, age: 0 });
                            
                            node.currentZoneIndex = node.targetZoneIndex;
                            node.targetZoneIndex = getWeightedNextZone(node.currentZoneIndex);
                            node.isMoving = false;
                            node.pauseStartTime = currentTime;
                            node.pauseDuration = Math.random() * 3500 + 500;
                        }
                    } else if (currentTime - node.pauseStartTime > node.pauseDuration) {
                        node.isMoving = true;
                    }
                });
            }
            draw(totalRotation, runningTime);
            requestAnimationFrame(animate);
        }

        awarenessNodes.push(createNode());
        requestAnimationFrame(animate);
    </script>
</body>
</html>

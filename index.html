<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7 Shape Animation</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
        #controls {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            padding: 10px;
            border-radius: 5px;
            font-family: sans-serif;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="controls">
        <label>Ball Speed: <input type="range" id="ballSpeed" min="100" max="2000" value="500"></label><br>
        <label>Rotation Speed: <input type="range" id="rotSpeed" min="0" max="50" value="10"></label><br>
        <label>Num Balls: <input type="range" id="numBalls" min="1" max="5" value="1"></label>
    </div>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const numCircles = 7;
        const radius = 150; // Radius of the large circle
        const circleRadius = 40; // Radius of each hollow shape
        const ballRadius = 15;

        const shapes = [];
        for (let i = 0; i < numCircles; i++) {
            const angle = (i / numCircles) * 2 * Math.PI;
            shapes.push({
                initialAngle: angle,
                reactionProgress: 0,
                holdingTime: 0,
                sides: i === 0 ? 0 : i + 2 // Triangle to Octagon, plus Circle
            });
        }

        let balls = [];

        function createBall() {
            const current = Math.floor(Math.random() * numCircles);
            let target;
            do {
                target = Math.floor(Math.random() * numCircles);
            } while (target === current);
            
            return {
                currentCircleIndex: current,
                targetCircleIndex: target,
                progress: 0, // 0 to 1
                isMoving: false,
                lastTime: performance.now(),
                pauseStartTime: performance.now()
            };
        }

        function getShapePosition(shape, rotation) {
            const angle = shape.initialAngle + rotation;
            return {
                x: width / 2 + radius * Math.cos(angle),
                y: height / 2 + radius * Math.sin(angle)
            };
        }

        function drawShape(ctx, x, y, radius, sides) {
            ctx.beginPath();
            if (sides === 0) {
                // Circle
                ctx.arc(x, y, radius, 0, 2 * Math.PI);
            } else {
                // Polygon
                for (let i = 0; i < sides; i++) {
                    const angle = (i / sides) * 2 * Math.PI - Math.PI / 2;
                    const px = x + radius * Math.cos(angle);
                    const py = y + radius * Math.sin(angle);
                    if (i === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.closePath();
            }
        }

        function draw(rotation) {
            ctx.clearRect(0, 0, width, height);

            // Group balls by shape
            const ballsOnShape = {};
            balls.forEach(ball => {
                if (!ball.isMoving) {
                    if (!ballsOnShape[ball.currentCircleIndex]) {
                        ballsOnShape[ball.currentCircleIndex] = [];
                    }
                    ballsOnShape[ball.currentCircleIndex].push(ball);
                }
            });

            // Update holding time
            shapes.forEach((shape, index) => {
                if (ballsOnShape[index]) {
                    shape.holdingTime += 0.01;
                } else {
                    shape.holdingTime = 0;
                }
            });

            // Recalculate shape positions based on rotation
            const currentPositions = shapes.map(c => getShapePosition(c, rotation));

            // Draw hollow shapes
            currentPositions.forEach((pos, i) => {
                const shape = shapes[i];
                const ballCount = ballsOnShape[i] ? ballsOnShape[i].length : 0;
                
                // Reaction effect
                let scale = 1;
                if (shape.reactionProgress > 0) {
                    scale = 1 + Math.sin(shape.reactionProgress * Math.PI) * 0.3;
                    shape.reactionProgress -= 0.05;
                    if (shape.reactionProgress < 0) shape.reactionProgress = 0;
                }
                
                // Hot Potato
                scale += shape.holdingTime * 0.3;

                drawShape(ctx, pos.x, pos.y, circleRadius * scale, shape.sides);
                
                // Color based on ball count
                if (ballCount >= 3) {
                    ctx.strokeStyle = '#f00'; // Red
                } else if (ballCount === 2) {
                    ctx.strokeStyle = '#ff0'; // Yellow
                } else {
                    ctx.strokeStyle = '#fff'; // White
                }
                
                ctx.lineWidth = 3 * scale;
                ctx.stroke();
            });

            // Draw balls
            balls.forEach(ball => {
                let ballX, ballY;
                let isStretched = false;
                let angleToTarget = 0;
                let stretchFactor = 1.5;

                if (ball.isMoving) {
                    const start = currentPositions[ball.currentCircleIndex];
                    const end = currentPositions[ball.targetCircleIndex];
                    ballX = start.x + (end.x - start.x) * ball.progress;
                    ballY = start.y + (end.y - start.y) * ball.progress;
                    
                    isStretched = true;
                    angleToTarget = Math.atan2(end.y - start.y, end.x - start.x);
                } else {
                    const pos = currentPositions[ball.currentCircleIndex];
                    const group = ballsOnShape[ball.currentCircleIndex];
                    const idx = group.indexOf(ball);
                    const count = group.length;

                    if (count > 1) {
                        const offset = circleRadius * 0.4;
                        const angle = (idx / count) * 2 * Math.PI;
                        ballX = pos.x + offset * Math.cos(angle);
                        ballY = pos.y + offset * Math.sin(angle);
                    } else {
                        ballX = pos.x;
                        ballY = pos.y;
                    }
                }

                ctx.beginPath();
                if (isStretched) {
                    ctx.ellipse(ballX, ballY, ballRadius * stretchFactor, ballRadius, angleToTarget, 0, 2 * Math.PI);
                } else {
                    ctx.arc(ballX, ballY, ballRadius, 0, 2 * Math.PI);
                }
                ctx.fillStyle = ball.isMoving ? '#ff0' : '#0f0'; 
                ctx.fill();
            });
        }

        let totalRotation = 0;
        function animate(currentTime) {
            // Update num balls
            const targetNumBalls = parseInt(document.getElementById('numBalls').value);
            while (balls.length < targetNumBalls) {
                balls.push(createBall());
            }
            while (balls.length > targetNumBalls) {
                balls.pop();
            }

            const ballSpeed = parseInt(document.getElementById('ballSpeed').value);
            const rotSpeed = parseInt(document.getElementById('rotSpeed').value) / 1000;

            totalRotation += rotSpeed;

            balls.forEach(ball => {
                const deltaTime = currentTime - ball.lastTime;
                ball.lastTime = currentTime;

                if (ball.isMoving) {
                    ball.progress += deltaTime / ballSpeed;
                    if (ball.progress >= 1) {
                        ball.progress = 0;
                        ball.currentCircleIndex = ball.targetCircleIndex;
                        
                        shapes[ball.currentCircleIndex].reactionProgress = 1;
                        
                        let nextTarget;
                        do {
                            nextTarget = Math.floor(Math.random() * numCircles);
                        } while (nextTarget === ball.currentCircleIndex);
                        
                        ball.targetCircleIndex = nextTarget;
                        ball.isMoving = false;
                        ball.pauseStartTime = currentTime;
                    }
                } else {
                    if (currentTime - ball.pauseStartTime > 500) {
                        ball.isMoving = true;
                    }
                }
            });

            draw(totalRotation);
            requestAnimationFrame(animate);
        }

        // Initialize with one ball
        balls.push(createBall());

        requestAnimationFrame(animate);
    </script>
</body>
</html>

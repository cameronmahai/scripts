<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7 Circle Animation</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
        #controls {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            padding: 10px;
            border-radius: 5px;
            font-family: sans-serif;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="controls">
        <label>Ball Speed: <input type="range" id="ballSpeed" min="100" max="2000" value="500"></label><br>
        <label>Rotation Speed: <input type="range" id="rotSpeed" min="0" max="50" value="10"></label><br>
        <label>Num Balls: <input type="range" id="numBalls" min="1" max="5" value="1"></label><br>
        <button id="pauseBtn">Pause</button>
    </div>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let isPaused = false;

        document.getElementById('pauseBtn').addEventListener('click', (e) => {
            isPaused = !isPaused;
            e.target.innerText = isPaused ? 'Resume' : 'Pause';
        });

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const numCircles = 7;
        const radius = 150; // Radius of the large circle
        const circleRadius = 40; // Radius of each hollow circle
        const ballRadius = 15;

        const circles = [];
        for (let i = 0; i < numCircles; i++) {
            const angle = (i / numCircles) * 2 * Math.PI;
            circles.push({
                initialAngle: angle,
                reactionProgress: 0,
                holdingTime: 0
            });
        }

        let balls = [];

        function createBall() {
            const current = Math.floor(Math.random() * numCircles);
            let target;
            do {
                target = Math.floor(Math.random() * numCircles);
            } while (target === current);
            
            return {
                currentCircleIndex: current,
                targetCircleIndex: target,
                progress: 0, // 0 to 1
                isMoving: false,
                lastTime: performance.now(),
                pauseStartTime: performance.now()
            };
        }

        function getCirclePosition(circle, rotation) {
            const angle = circle.initialAngle + rotation;
            return {
                x: width / 2 + radius * Math.cos(angle),
                y: height / 2 + radius * Math.sin(angle)
            };
        }

        function draw(rotation) {
            ctx.clearRect(0, 0, width, height);

            // Group balls by circle
            const ballsOnCircle = {};
            balls.forEach(ball => {
                if (!ball.isMoving) {
                    if (!ballsOnCircle[ball.currentCircleIndex]) {
                        ballsOnCircle[ball.currentCircleIndex] = [];
                    }
                    ballsOnCircle[ball.currentCircleIndex].push(ball);
                }
            });

            // Update holding time
            circles.forEach((circle, index) => {
                if (ballsOnCircle[index]) {
                    circle.holdingTime += 0.01;
                } else {
                    circle.holdingTime = 0;
                }
            });

            // Recalculate circle positions based on rotation
            const currentPositions = circles.map(c => getCirclePosition(c, rotation));

            // Draw hollow circles
            currentPositions.forEach((pos, i) => {
                const circle = circles[i];
                const ballCount = ballsOnCircle[i] ? ballsOnCircle[i].length : 0;
                
                // Reaction effect
                let scale = 1;
                if (circle.reactionProgress > 0) {
                    scale = 1 + Math.sin(circle.reactionProgress * Math.PI) * 0.3;
                    circle.reactionProgress -= 0.05;
                    if (circle.reactionProgress < 0) circle.reactionProgress = 0;
                }
                
                // Hot Potato
                scale += circle.holdingTime * 0.3;

                ctx.beginPath();
                ctx.arc(pos.x, pos.y, circleRadius * scale, 0, 2 * Math.PI);
                
                // Color based on ball count
                if (ballCount >= 3) {
                    ctx.strokeStyle = '#f00'; // Red
                } else if (ballCount === 2) {
                    ctx.strokeStyle = '#ff0'; // Yellow
                } else {
                    ctx.strokeStyle = '#fff'; // White
                }
                
                ctx.lineWidth = 3 * scale;
                ctx.stroke();
            });

            // Draw balls
            balls.forEach(ball => {
                let ballX, ballY;
                let isStretched = false;
                let angleToTarget = 0;
                let stretchFactor = 1.5;

                if (ball.isMoving) {
                    const start = currentPositions[ball.currentCircleIndex];
                    const end = currentPositions[ball.targetCircleIndex];
                    ballX = start.x + (end.x - start.x) * ball.progress;
                    ballY = start.y + (end.y - start.y) * ball.progress;
                    
                    isStretched = true;
                    angleToTarget = Math.atan2(end.y - start.y, end.x - start.x);
                } else {
                    const pos = currentPositions[ball.currentCircleIndex];
                    const group = ballsOnCircle[ball.currentCircleIndex];
                    const idx = group.indexOf(ball);
                    const count = group.length;

                    if (count > 1) {
                        const offset = circleRadius * 0.4;
                        const angle = (idx / count) * 2 * Math.PI;
                        ballX = pos.x + offset * Math.cos(angle);
                        ballY = pos.y + offset * Math.sin(angle);
                    } else {
                        ballX = pos.x;
                        ballY = pos.y;
                    }
                }

                ctx.beginPath();
                if (isStretched) {
                    ctx.ellipse(ballX, ballY, ballRadius * stretchFactor, ballRadius, angleToTarget, 0, 2 * Math.PI);
                } else {
                    ctx.arc(ballX, ballY, ballRadius, 0, 2 * Math.PI);
                }
                ctx.fillStyle = ball.isMoving ? '#ff0' : '#0f0'; 
                ctx.fill();
            });
        }

        let totalRotation = 0;
        let lastTimestamp = performance.now();
        function animate(currentTime) {
            if (!isPaused) {
                const deltaTime = currentTime - lastTimestamp;
                
                // Update num balls
                const targetNumBalls = parseInt(document.getElementById('numBalls').value);
                while (balls.length < targetNumBalls) {
                    balls.push(createBall());
                }
                while (balls.length > targetNumBalls) {
                    balls.pop();
                }

                const ballSpeed = parseInt(document.getElementById('ballSpeed').value);
                const rotSpeed = parseInt(document.getElementById('rotSpeed').value) / 1000;

                totalRotation += rotSpeed;

                balls.forEach(ball => {
                    const ballDeltaTime = currentTime - ball.lastTime;
                    ball.lastTime = currentTime;

                    if (ball.isMoving) {
                        ball.progress += ballDeltaTime / ballSpeed;
                        if (ball.progress >= 1) {
                            ball.progress = 0;
                            ball.currentCircleIndex = ball.targetCircleIndex;
                            
                            circles[ball.currentCircleIndex].reactionProgress = 1;
                            
                            let nextTarget;
                            do {
                                nextTarget = Math.floor(Math.random() * numCircles);
                            } while (nextTarget === ball.currentCircleIndex);
                            
                            ball.targetCircleIndex = nextTarget;
                            ball.isMoving = false;
                            ball.pauseStartTime = currentTime;
                        }
                    } else {
                        if (currentTime - ball.pauseStartTime > 500) {
                            ball.isMoving = true;
                        }
                    }
                });
                
                lastTimestamp = currentTime;
            } else {
                // If paused, keep track of time to avoid jumps
                lastTimestamp = currentTime;
            }

            draw(totalRotation);
            requestAnimationFrame(animate);
        }

        // Initialize with one ball
        balls.push(createBall());

        requestAnimationFrame(animate);
    </script>
</body>
</html>

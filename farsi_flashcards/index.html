<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farsi Flashcards</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <h1>Farsi Flashcards</h1>
        <div id="stats">Score: <span id="score">0</span> | Strikes: <span id="strikes">0</span>/3 | Time: <span id="timer">3.00</span></div>
        <div id="word-display">
            <h2 id="farsi-word">Loading...</h2>
        </div>
        <input type="text" id="translation-input" placeholder="Type translation here..." autofocus>
        <button id="submit-btn">Submit</button>
        <p id="feedback"></p>
    </div>
    <script src="script.js"></script>
</body>
</html>

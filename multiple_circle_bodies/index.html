<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dual Consciousness</title>
    <style>
        body { margin: 0; overflow: hidden; background: #2c3e50; }
        canvas { display: block; }
        .controls {
            position: absolute;
            top: 10px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            padding: 10px;
            border-radius: 5px;
            font-family: sans-serif;
            z-index: 10;
        }
        #controls1 { left: 10px; }
        #controls2 { right: 10px; }
        #controls-global { left: 40%; top: 10px; }
        #compatibility-ui {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px 30px;
            border-radius: 20px;
            font-family: sans-serif;
            text-align: center;
            z-index: 10;
        }
        #current-status { font-size: 1.2em; font-weight: bold; }
        #overall-status { font-size: 1em; margin-top: 5px; color: #ccc; }
        .memory-debug { font-size: 0.8em; margin-top: 5px; color: #aaa; }
    </style>
</head>
<body>
    <div id="controls1" class="controls">
        <h3>Consciousness 1</h3>
        <label>Focus: <input type="range" id="focus1" min="100" max="2000" value="500"></label><br>
        <label>Intelligence: <input type="range" id="intelligence1" min="1" max="5" value="1"></label><br>
        <label>Adaptability: <input type="range" id="adapt1" min="0" max="100" value="50"></label>
        <div id="memory1" class="memory-debug">Memory: [0, 0]</div>
    </div>
    <div id="controls-global" class="controls">
        <label>Compatibility Bias: <input type="range" id="compPool" min="0" max="100" value="50"></label><br>
        <button id="restartBtn">Restart Simulation</button>
        <button id="pauseBtn">Pause</button>
    </div>
    <div id="controls2" class="controls">
        <h3>Consciousness 2</h3>
        <label>Focus: <input type="range" id="focus2" min="100" max="2000" value="500"></label><br>
        <label>Intelligence: <input type="range" id="intelligence2" min="1" max="5" value="1"></label><br>
        <label>Adaptability: <input type="range" id="adapt2" min="0" max="100" value="50"></label>
        <div id="memory2" class="memory-debug">Memory: [0, 0]</div>
    </div>
    <div id="compatibility-ui">
        <div id="current-status">Status: Calculating...</div>
        <div id="overall-status">Overall: Calculating...</div>
    </div>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const currentUI = document.getElementById('current-status');
        const overallUI = document.getElementById('overall-status');
        const memUI1 = document.getElementById('memory1');
        const memUI2 = document.getElementById('memory2');
        let width, height;
        let isPaused = false;
        let lastTime = performance.now();
        let consciousnesses = [];
        let compHistory = { compatible: 0, incompatible: 0 };
        
        const TYPE_COLORS = ["#88b378", "#d18a8f"]; 
        const COLOR_COMPATIBLE = "#88b378";
        const COLOR_INCOMPATIBLE = "#d18a8f";

        document.getElementById('pauseBtn').addEventListener('click', (e) => {
            isPaused = !isPaused;
            e.target.innerText = isPaused ? 'Resume' : 'Pause';
        });

        document.getElementById('restartBtn').addEventListener('click', initSimulation);

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Consciousness {
            constructor(id, centerX, centerY, zoneTypes) {
                this.id = id;
                this.centerX = centerX;
                this.centerY = centerY;
                this.radius = 120;
                this.zoneRadius = 30;
                this.awarenessRadius = 10;
                this.numZones = 7;
                this.zones = [];
                this.memory = {0: 0, 1: 0}; 
                for (let i = 0; i < this.numZones; i++) {
                    this.zones.push({ 
                        initialAngle: (i / this.numZones) * 2 * Math.PI, 
                        impactPhase: 0, impactTime: 0, 
                        type: zoneTypes[i]
                    });
                }
                this.nodes = [this.createNode()];
            }

            createNode() {
                const current = Math.floor(Math.random() * this.numZones);
                return {
                    currentZoneIndex: current,
                    targetZoneIndex: this.getWeightedNextZone(current),
                    progress: 0,
                    isMoving: false,
                    lastTime: performance.now(),
                    pauseStartTime: performance.now(),
                    pauseDuration: Math.random() * 3500 + 500
                };
            }
            getWeightedNextZone(current) {
                const adapt = parseInt(document.getElementById('adapt' + this.id).value) / 100;
                const weights = this.zones.map((z, i) => {
                    if (i === current) return 0;
                    let weight = 1;
                    const mem = this.memory[z.type];
                    if (mem > 0) weight = 1 + (adapt * 50); 
                    else if (mem < 0) weight = Math.max(0.01, 1 - (adapt * 0.99));
                    return weight;
                });
                const totalWeight = weights.reduce((a, b) => a + b, 0);
                let r = Math.random() * totalWeight;
                for (let i = 0; i < weights.length; i++) {
                    r -= weights[i];
                    if (r <= 0) return i;
                }
                return (current + 1) % this.numZones;
            }

            learn(zoneType, isCompatible) {
                const adapt = parseInt(document.getElementById('adapt' + this.id).value) / 100;
                if (Math.random() < adapt) {
                    this.memory[zoneType] = isCompatible ? 1 : -1;
                }
            }

            getZonePosition(zone) {
                return { x: this.centerX + this.radius * Math.cos(zone.initialAngle), y: this.centerY + this.radius * Math.sin(zone.initialAngle) };
            }

            update(dt, currentTime) {
                const numNodes = parseInt(document.getElementById('intelligence' + this.id).value);
                while (this.nodes.length < numNodes) this.nodes.push(this.createNode());
                while (this.nodes.length > numNodes) this.nodes.pop();
                const speed = parseInt(document.getElementById('focus' + this.id).value);
                this.nodes.forEach(node => {
                    if (node.isMoving) {
                        node.progress += dt / speed;
                        if (node.progress >= 1) {
                            node.progress = 0;
                            this.zones[node.targetZoneIndex].impactPhase = 1;
                            this.zones[node.targetZoneIndex].impactTime = 0;
                            node.currentZoneIndex = node.targetZoneIndex;
                            node.targetZoneIndex = this.getWeightedNextZone(node.currentZoneIndex);
                            node.isMoving = false;
                            node.pauseStartTime = currentTime;
                            node.pauseDuration = Math.random() * 3500 + 500;
                        }
                    } else if (currentTime - node.pauseStartTime > node.pauseDuration) {
                        node.isMoving = true;
                    }
                });
            }

            draw() {
                const nodeGroups = {};
                this.nodes.forEach(node => {
                    const zoneIdx = node.isMoving ? -1 : node.currentZoneIndex;
                    if (zoneIdx !== -1) {
                        if (!nodeGroups[zoneIdx]) nodeGroups[zoneIdx] = [];
                        nodeGroups[zoneIdx].push(node);
                    }
                });

                const currentPositions = this.zones.map(z => this.getZonePosition(z));

                currentPositions.forEach((pos, i) => {
                    const nodes = nodeGroups[i] || [];
                    const count = nodes.length;
                    const zone = this.zones[i];
                    if (!isPaused && zone.impactPhase > 0) {
                        zone.impactTime += 16.6; 
                        if (zone.impactTime >= 400) { zone.impactPhase++; zone.impactTime = 0; if (zone.impactPhase > 3) zone.impactPhase = 0; }
                    }
                    let scaleX = 1, scaleY = 1;
                    if (zone.impactPhase > 0) {
                        const wobble = Math.sin(zone.impactTime * 0.03) * (0.4 / zone.impactPhase);
                        scaleX = 1 + wobble; scaleY = 1 - wobble;
                    }
                    ctx.save();
                    ctx.translate(pos.x, pos.y);
                    ctx.scale(scaleX, scaleY);
                    ctx.beginPath();
                    ctx.arc(0, 0, this.zoneRadius, 0, 2 * Math.PI);
                    ctx.restore();
                    ctx.strokeStyle = TYPE_COLORS[zone.type];
                    ctx.lineWidth = 3;
                    ctx.stroke();
                });

                this.nodes.forEach((node) => {
                    const pos = currentPositions[node.isMoving ? -1 : node.currentZoneIndex] || {x:0, y:0};
                    let x = pos.x, y = pos.y;
                    if (node.isMoving) {
                        const start = currentPositions[node.currentZoneIndex];
                        const end = currentPositions[node.targetZoneIndex];
                        x = start.x + (end.x - start.x) * node.progress;
                        y = start.y + (end.y - start.y) * node.progress;
                    }
                    ctx.beginPath();
                    ctx.arc(x, y, this.awarenessRadius, 0, 2 * Math.PI);
                    ctx.fillStyle = this.zones[node.currentZoneIndex] ? TYPE_COLORS[this.zones[node.currentZoneIndex].type] : '#fff';
                    ctx.lineWidth = 4;
                    ctx.stroke();
                    ctx.fill();
                });
            }

            getActiveZone() {
                for (let i = 0; i < this.numZones; i++) {
                    const nodesInZone = this.nodes.filter(n => !n.isMoving && n.currentZoneIndex === i);
                    if (nodesInZone.length > 0) return this.zones[i];
                }
                return null;
            }
        }

        function initSimulation() {
            const compBias = parseInt(document.getElementById('compPool').value) / 100;
            const zoneTypes1 = Array.from({length: 7}, () => Math.floor(Math.random() * 2));
            const zoneTypes2 = zoneTypes1.map(t => Math.random() < compBias ? t : (1 - t));
            
            consciousnesses = [
                new Consciousness(1, width / 4, height / 2, zoneTypes1),
                new Consciousness(2, 3 * width / 4, height / 2, zoneTypes2)
            ];
            compHistory = { compatible: 0, incompatible: 0 };
        }

        function checkCompatibility() {
            const z1 = consciousnesses[0].getActiveZone();
            const z2 = consciousnesses[1].getActiveZone();
            memUI1.innerText = `Memory: [${consciousnesses[0].memory[0]}, ${consciousnesses[0].memory[1]}]`;
            memUI2.innerText = `Memory: [${consciousnesses[1].memory[0]}, ${consciousnesses[1].memory[1]}]`;
            if (z1 === null || z2 === null) {
                currentUI.innerText = "Status: Calculating...";
                currentUI.style.color = "#ccc";
                return;
            }
            const compatible = (z1.type === z2.type);
            consciousnesses[0].learn(z2.type, compatible);
            consciousnesses[1].learn(z1.type, compatible);
            currentUI.innerText = compatible ? "Status: Compatible" : "Status: Incompatible";
            currentUI.style.color = compatible ? COLOR_COMPATIBLE : COLOR_INCOMPATIBLE;
            compHistory[compatible ? 'compatible' : 'incompatible']++;
            const total = compHistory.compatible + compHistory.incompatible;
            const overallCompatible = compHistory.compatible >= compHistory.incompatible;
            overallUI.innerText = overallCompatible ? "Overall: Compatible" : "Overall: Incompatible";
            overallUI.style.color = overallCompatible ? COLOR_COMPATIBLE : COLOR_INCOMPATIBLE;
        }

        function drawPieChart() {
            const total = compHistory.compatible + compHistory.incompatible;
            if (total === 0) return;
            const centerX = width - 100;
            const centerY = height - 100;
            const radius = 50;
            const compAngle = (compHistory.compatible / total) * 2 * Math.PI;
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.arc(centerX, centerY, radius, 0, compAngle);
            ctx.fillStyle = COLOR_COMPATIBLE;
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.arc(centerX, centerY, radius, compAngle, 2 * Math.PI);
            ctx.fillStyle = COLOR_INCOMPATIBLE;
            ctx.fill();
        }

        function animate(currentTime) {
            const dt = currentTime - lastTime;
            lastTime = currentTime;
            if (!isPaused) {
                consciousnesses.forEach(c => c.update(dt, currentTime));
                checkCompatibility();
            }
            ctx.clearRect(0, 0, width, height);
            consciousnesses.forEach(c => c.draw());
            drawPieChart();
            requestAnimationFrame(animate);
        }

        initSimulation();
        animate(performance.now());
    </script>
</body>
</html>
